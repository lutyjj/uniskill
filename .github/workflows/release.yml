name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            name: darwin-arm64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: linux-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Extract version
        id: version
        shell: bash
        run: |
          version=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
          else
            tag="v${version}"
          fi
          if [[ "$tag" != "v${version}" ]]; then
            echo "tag ${tag} does not match Cargo.toml version ${version}" >&2
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        run: |
          rustup toolchain install --profile minimal --no-self-update
          rustup target add ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Release gate
        run: make release TARGET_TRIPLE=${{ matrix.target }} PACKAGE_NAME=uniskill-${{ matrix.name }}-${{ steps.version.outputs.tag }}

      - name: List release assets
        run: |
          ls -lh dist/uniskill-${{ matrix.name }}-${{ steps.version.outputs.tag }}*

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: uniskill-${{ matrix.name }}
          path: |
            dist/uniskill-${{ matrix.name }}-${{ steps.version.outputs.tag }}
            dist/uniskill-${{ matrix.name }}-${{ steps.version.outputs.tag }}.tar.gz

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        shell: bash
        run: |
          version=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
          else
            tag="v${version}"
          fi
          if [[ "$tag" != "v${version}" ]]; then
            echo "tag ${tag} does not match Cargo.toml version ${version}" >&2
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p release
          find artifacts -type f -name 'uniskill-*' -exec cp {} release/ \;

          asset_count=$(find release -type f -name 'uniskill-*' | wc -l | tr -d ' ')
          if [[ "$asset_count" -ne 4 ]]; then
            echo "expected 4 release assets, found ${asset_count}" >&2
            find release -maxdepth 1 -type f -print >&2
            exit 1
          fi

          cd release
          shasum -a 256 uniskill-* > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: changelog
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          GITHUB_REPO: ${{ github.repository }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: uniskill ${{ steps.version.outputs.tag }}
          body: ${{ steps.changelog.outputs.content }}
          target_commitish: ${{ github.sha }}
          files: |
            release/uniskill-darwin-arm64-${{ steps.version.outputs.tag }}
            release/uniskill-darwin-arm64-${{ steps.version.outputs.tag }}.tar.gz
            release/uniskill-linux-x86_64-${{ steps.version.outputs.tag }}
            release/uniskill-linux-x86_64-${{ steps.version.outputs.tag }}.tar.gz
            release/checksums-sha256.txt
