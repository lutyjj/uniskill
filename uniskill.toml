# Project-level config — demonstrates virtual bundles.
# We wire a remote caveman skill into the built-in pi harness alongside our local uniskill-dev skill.

[harnesses.agents]
scope = "project"
pattern = ".agents/skills/{name}"

# Local bundle: our own development skill, installed project-locally
[bundles.uniskill-dev-skill]
source = "./uniskill-bundle"
harnesses = ["pi"]

# Virtual bundle: fetch caveman skill from a remote URL
[bundles.remote-caveman]
harnesses = ["agents"]

[bundles.remote-caveman.skills.caveman]
url = "https://raw.githubusercontent.com/JuliusBrussee/caveman/refs/heads/main/skills/caveman/SKILL.md"
