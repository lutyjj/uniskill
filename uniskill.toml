# Project-level config. Everything installs into .agents/skills/ here.
# A whole local bundle and an explicit URL skill wired into one project harness.

[harnesses.agents]
pattern = ".agents/skills/{name}"

# Whole-bundle source: pull every skill under ./uniskill-bundle/skills/
[bundles.uniskill-dev-skill]
source = "./uniskill-bundle"
harnesses = ["agents"]

# Explicit skill: fetch caveman from a remote URL
[bundles.remote-caveman]
harnesses = ["agents"]

[bundles.remote-caveman.skills.caveman]
url = "https://raw.githubusercontent.com/JuliusBrussee/caveman/refs/heads/main/skills/caveman/SKILL.md"
